name: Build cf.gov Docker images

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: cfpb/actions/docker-build-push@d792d3820b690ce5d21691d2402f9bd3f8154783
        with:
          image-name: cfgov
